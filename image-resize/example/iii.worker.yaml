iii: v1

# Worker development environment configuration.
# Used by `iii worker dev` to build and run the project inside a Docker Sandbox.

name: image-resize-demo
version: 1.0.0

runtime:
  language: typescript
  package_manager: bun
  entry: src/index.ts

# System packages to install inside the sandbox VM (apt-get)
dependencies:
  system: []

  # Runtime install command (runs first)
  setup: |
    curl -fsSL https://bun.sh/install | bash

  # Install project dependencies
  install: |
    export PATH=$HOME/.bun/bin:$PATH && bun install

  # Start the worker
  run: |
    export PATH=$HOME/.bun/bin:$PATH && bun src/index.ts

# Environment variables injected into the sandbox
env:
  III_URL: "ws://host.docker.internal:49134"
  III_ENGINE_URL: "ws://host.docker.internal:49134"

# Resources (hints for the sandbox VM)
resources:
  memory: 512Mi
  cpu: "1.0"
