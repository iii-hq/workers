iii: v2

name: image-resize-demo
version: 1.0.0

runtime:
  language: typescript
  package_manager: bun
  entry: src/index.ts

resources:
  memory: 512
  cpus: 1

# Optional: explicit scripts override auto-detection
scripts:
  setup: "curl -fsSL https://bun.sh/install | bash"
  install: "export PATH=$HOME/.bun/bin:$PATH && bun install"
  start: "export PATH=$HOME/.bun/bin:$PATH && bun src/index.ts"
