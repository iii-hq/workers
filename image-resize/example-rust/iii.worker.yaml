iii: v2

name: image-resize-demo-rust
version: 1.0.0

# NOTE: Rust compilation inside Docker Sandbox on Apple Silicon is broken
# (SIGILL/SIGBUS in rustc due to VM CPU emulation). Run directly on host:
#   cd example-rust && III_URL=ws://localhost:49134 cargo run

runtime:
  language: rust
  package_manager: cargo
  entry: src/main.rs

resources:
  memory: 512
  cpus: 1

scripts:
  setup: |
    echo "⚠ Rust sandbox dev not supported on Apple Silicon — run on host instead"
  install: |
    echo "skipped"
  start: |
    echo "Run on host: III_URL=ws://localhost:49134 cargo run" && exit 1
