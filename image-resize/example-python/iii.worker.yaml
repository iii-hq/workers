iii: v2

name: image-resize-demo-python
version: 1.0.0

runtime:
  language: python
  package_manager: pip
  entry: image_resize_demo

resources:
  memory: 256
  cpus: 1

scripts:
  setup: "sudo apt-get update && sudo apt-get install -y python3-venv python3-pip"
  install: "python3 -m venv .venv && .venv/bin/pip install -e ."
  start: ".venv/bin/python -m image_resize_demo"
