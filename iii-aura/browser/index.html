<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura — iii On-Device AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg: #050509;
    --c-surface: rgba(255,255,255,0.04);
    --c-surface-hover: rgba(255,255,255,0.07);
    --c-text: #c8cad0;
    --c-text-dim: #5a5d66;
    --c-text-bright: #eef0f4;
    --c-listen: #4ade80;
    --c-listen-dim: rgba(74,222,128,0.12);
    --c-process: #f59e0b;
    --c-process-dim: rgba(245,158,11,0.12);
    --c-speak: #818cf8;
    --c-speak-dim: rgba(129,140,248,0.12);
    --c-loading: #3a3d46;
    --c-loading-dim: rgba(58,61,70,0.12);
    --glow: var(--c-loading);
    --glow-dim: var(--c-loading-dim);
    --font-body: 'Instrument Sans', system-ui, sans-serif;
    --font-display: 'Syne', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--c-bg);
    color: var(--c-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, var(--glow-dim) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.6s ease;
    z-index: 0;
  }

  header {
    width: 100%;
    max-width: 720px;
    padding: 20px 8px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 2;
    flex-shrink: 0;
  }

  .logo { display: flex; align-items: center; gap: 10px; }

  .logo-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--glow) 0%, transparent 100%);
    opacity: 0.7;
    transition: background 0.4s ease, opacity 0.4s ease;
  }

  .logo h1 {
    font-family: var(--font-body);
    font-size: 20px;
    font-weight: 600;
    color: var(--c-text-bright);
    letter-spacing: 0.01em;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 100px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.3s, background 0.3s;
  }

  .status-pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--c-text-dim);
    transition: background 0.3s;
  }
  .status-pill.connected { color: var(--c-listen); background: var(--c-listen-dim); }
  .status-pill.connected::before { background: var(--c-listen); }
  .status-pill.disconnected { color: #f87171; background: rgba(248,113,113,0.1); }
  .status-pill.disconnected::before { background: #f87171; }
  .status-pill.processing { color: var(--c-process); background: var(--c-process-dim); }
  .status-pill.processing::before { background: var(--c-process); }

  .portal-stack {
    flex: 1;
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 8px 16px;
    gap: 0;
    z-index: 2;
    min-height: 0;
  }

  .viewport-wrap {
    position: relative;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 16/9;
    border-radius: 18px;
    flex-shrink: 0;
    overflow: hidden;
  }

  .viewport-wrap::before,
  .viewport-wrap::after,
  .viewport-glow {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 20px;
    pointer-events: none;
    transition: box-shadow 0.4s ease, opacity 0.4s ease;
  }

  .viewport-wrap::before { box-shadow: inset 0 0 30px var(--glow-dim), 0 0 15px var(--glow-dim); z-index: 3; }
  .viewport-wrap::after { box-shadow: 0 0 40px 8px var(--glow-dim); z-index: 2; }
  .viewport-glow { z-index: 1; }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
    background: #111;
    transition: opacity 0.3s;
  }

  .waveform-wrap {
    width: 100%;
    max-width: 400px;
    height: 48px;
    margin: 12px auto 8px;
    flex-shrink: 0;
  }

  #waveform { width: 100%; height: 100%; }

  .transcript {
    flex: 1;
    width: 100%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 8px 0;
    min-height: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--c-surface-hover) transparent;
  }

  .msg {
    padding: 12px 16px;
    border-radius: 14px;
    max-width: 85%;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--c-surface-hover);
    color: var(--c-text-bright);
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--c-surface);
    color: var(--c-text);
    border-bottom-left-radius: 4px;
  }

  .msg .meta {
    font-size: 10px;
    color: var(--c-text-dim);
    margin-top: 6px;
    letter-spacing: 0.03em;
  }

  .controls {
    width: 100%;
    max-width: 720px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 8px 0 16px;
    flex-shrink: 0;
  }

  .ctrl-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.08);
    background: var(--c-surface);
    color: var(--c-text-dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .ctrl-btn:hover { background: var(--c-surface-hover); color: var(--c-text); }
  .ctrl-btn.active { color: var(--c-listen); border-color: rgba(74,222,128,0.25); }

  .state-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--c-loading);
    transition: background 0.3s;
  }
  .dot.listening { background: var(--c-listen); }
  .dot.processing { background: var(--c-process); }
  .dot.speaking { background: var(--c-speak); }

  .on-device-pill {
    font-size: 10px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .on-device-pill svg { width: 10px; height: 10px; }

  .loading-dots { display: inline-flex; gap: 4px; }
  .loading-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--c-text-dim);
    animation: blink 1.4s infinite both;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  .iii-badge {
    position: fixed;
    bottom: 12px;
    right: 16px;
    font-size: 10px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    z-index: 10;
    opacity: 0.5;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <h1>Aura</h1>
  </div>
  <span id="status" class="status-pill">Connecting</span>
</header>

<div class="portal-stack">
  <div id="viewportWrap" class="viewport-wrap loading">
    <div class="viewport-glow"></div>
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="waveform-wrap">
    <canvas id="waveform"></canvas>
  </div>

  <div id="messages" class="transcript"></div>

  <div class="controls">
    <button id="cameraToggle" class="ctrl-btn active">Camera On</button>
    <div class="state-indicator">
      <div id="stateDot" class="dot loading"></div>
      <span id="stateText">Loading...</span>
    </div>
    <span class="on-device-pill">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="12" height="9" rx="2"/><path d="M5 4V3a3 3 0 0 1 6 0v1"/></svg>
      On-device
    </span>
  </div>
</div>

<div class="iii-badge">Powered by iii</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script type="module">
  import { init } from './src/aura.ts'
  init()
</script>
</body>
</html>
