line-length = 120
target-version = "py310"

extend-exclude = [
    "**/.venv",
    "**/venv",
    "**/build",
    "**/dist",
    "**/__pycache__",
    "**/target",
]

[lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = []

[lint.per-file-ignores]
"**/tests/**" = ["E501"]

[format]
quote-style = "double"
indent-style = "space"
