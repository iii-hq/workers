schema_version = "1.1"

[task]
name = "autoagent/hello-world"
description = "Create a file hello.txt containing 'Hello, World!'"
keywords = ["trivial", "file-creation"]

[metadata]
difficulty = "easy"
category = "programming"

[verifier]
timeout_sec = 30.0

[agent]
timeout_sec = 300.0

[environment]
cpus = 2
memory_mb = 4096
allow_internet = true

[environment.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
