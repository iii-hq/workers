name: OCI Build

on:
  workflow_call:
    inputs:
      worker_name:
        required: true
        type: string
      dockerfile_path:
        required: true
        type: string
      tag_name:
        required: true
        type: string
      is_prerelease:
        required: false
        type: boolean
        default: false
      dry_run:
        required: false
        type: boolean
        default: false
    secrets:
      III_CI_APP_ID:
        required: true
      III_CI_APP_PRIVATE_KEY:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ inputs.tag_name }}"
          VERSION="${TAG##*/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building ${{ inputs.worker_name }} version $VERSION"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ inputs.dockerfile_path }}
          platforms: linux/amd64,linux/arm64
          push: ${{ !inputs.dry_run }}
          tags: |
            ghcr.io/iii-hq/${{ inputs.worker_name }}:${{ steps.version.outputs.version }}
            ghcr.io/iii-hq/${{ inputs.worker_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify manifest embedded
        if: ${{ !inputs.dry_run }}
        run: |
          docker pull ghcr.io/iii-hq/${{ inputs.worker_name }}:${{ steps.version.outputs.version }}
          docker run --rm ghcr.io/iii-hq/${{ inputs.worker_name }}:${{ steps.version.outputs.version }} cat /iii/worker.yaml
