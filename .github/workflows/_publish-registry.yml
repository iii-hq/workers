name: Publish to workers registry

on:
  workflow_call:
    inputs:
      worker:
        description: 'Worker name (folder)'
        required: true
        type: string
      version:
        description: 'Semver version'
        required: true
        type: string
      deploy:
        description: 'binary | image'
        required: true
        type: string
      registry_tag:
        description: 'Registry tag (latest, next, ...)'
        required: false
        type: string
        default: latest
      tag:
        description: 'Git tag (e.g., image-resize/v1.0.0)'
        required: true
        type: string
      bin:
        description: 'Cargo binary name (binary deploy only)'
        required: false
        type: string
        default: ''
      image_tag:
        description: 'Fully-qualified image reference (image deploy only)'
        required: false
        type: string
        default: ''
      api_url:
        description: 'Workers registry base URL'
        required: false
        type: string
        default: 'https://api.workers.iii.dev'

jobs:
  publish:
    name: POST /publish (${{ inputs.worker }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install pyyaml
        run: pip install --quiet pyyaml

      - name: Install iii CLI
        run: |
          set -euo pipefail
          curl -fsSL https://install.iii.dev/iii/main/install.sh -o /tmp/install-iii.sh
          sh /tmp/install-iii.sh
          {
            echo "$HOME/.local/bin"
            echo "$HOME/.iii/bin"
          } >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$HOME/.iii/bin:$PATH"
          iii --version

      - name: Start III engine
        run: |
          set -euo pipefail
          printf 'workers: []\n' > config.yaml
          iii --config config.yaml --no-update-check > iii-engine.log 2>&1 &
          echo "$!" > iii-engine.pid

          for _ in {1..60}; do
            if ! kill -0 "$(cat iii-engine.pid)" 2>/dev/null; then
              echo "::error::iii engine exited before becoming ready"
              cat iii-engine.log
              exit 1
            fi

            if iii trigger --function-id='engine::workers::list' --payload='{}' >/tmp/iii-workers.json 2>/tmp/iii-trigger.err; then
              cat /tmp/iii-workers.json
              exit 0
            fi

            sleep 1
          done

          echo "::error::iii engine did not become ready"
          cat /tmp/iii-trigger.err || true
          cat iii-engine.log || true
          exit 1

      - name: Add local worker to III
        env:
          WORKER: ${{ inputs.worker }}
        run: |
          set -euo pipefail
          iii worker add "./$WORKER" --force --reset-config --wait

      - name: Collect worker interface
        env:
          WORKER: ${{ inputs.worker }}
        run: |
          args=("--worker" "$WORKER" "--out" "worker-interface.json" "--wait-seconds" "120")
          python3 .github/scripts/collect_worker_interface.py "${args[@]}"

      - name: Assert worker interface was collected
        run: |
          python3 - <<'PY'
          import json
          data = json.load(open("worker-interface.json"))
          if not data.get("functions"):
              raise SystemExit("no worker functions were collected")
          PY

      - name: Resolve binary artifacts
        if: inputs.deploy == 'binary'
        env:
          TAG: ${{ inputs.tag }}
          BIN: ${{ inputs.bin }}
          WORKER: ${{ inputs.worker }}
          REPO_URL: ${{ format('https://github.com/{0}', github.repository) }}
        run: |
          python3 .github/scripts/resolve_binary_artifacts.py \
            --repo-url "$REPO_URL" \
            --tag "$TAG" \
            --bin "${BIN:-$WORKER}" \
            --out binaries.json

      - name: Create empty binary artifacts
        if: inputs.deploy != 'binary'
        run: |
          printf '{}\n' > binaries.json

      - name: Build payload
        env:
          WORKER: ${{ inputs.worker }}
          VERSION: ${{ inputs.version }}
          DEPLOY: ${{ inputs.deploy }}
          REGISTRY_TAG: ${{ inputs.registry_tag }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          REPO_URL: ${{ format('https://github.com/{0}', github.repository) }}
        run: |
          python3 .github/scripts/build_publish_payload.py \
            --worker "$WORKER" \
            --version "$VERSION" \
            --registry-tag "$REGISTRY_TAG" \
            --deploy "$DEPLOY" \
            --repo-url "$REPO_URL" \
            --interface-json worker-interface.json \
            --binaries-json binaries.json \
            --image-tag "$IMAGE_TAG" \
            --out payload.json

      - name: POST /publish
        env:
          API_URL: ${{ inputs.api_url }}
          API_KEY: ${{ secrets.WORKERS_REGISTRY_API_KEY }}
        run: |
          if [[ -z "$API_KEY" ]]; then
            echo "::error::WORKERS_REGISTRY_API_KEY secret is not set"
            exit 1
          fi
          http=$(curl -sS -o response.json -w '%{http_code}' \
            -H "X-API-Key: $API_KEY" \
            -H "Content-Type: application/json" \
            -X POST "$API_URL/publish" \
            --data-binary @payload.json)
          echo "HTTP $http"
          cat response.json
          if [[ "$http" != "200" ]]; then
            echo "::error::publish failed with HTTP $http"
            exit 1
          fi

      - name: Dump III logs
        if: failure()
        run: |
          echo "::group::iii engine log"
          tail -n 200 iii-engine.log || true
          echo "::endgroup::"

      - name: Stop III engine
        if: always()
        run: |
          if [[ -f iii-engine.pid ]]; then
            kill "$(cat iii-engine.pid)" 2>/dev/null || true
          fi
