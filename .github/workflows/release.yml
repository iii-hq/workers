name: Release

on:
  push:
    tags:
      - 'image-resize/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., image-resize/v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-image-resize-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────
  # Setup: Parse tag metadata
  # ──────────────────────────────────────────────────────────────

  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
    steps:
      - name: Resolve tag
        id: resolve
        env:
          RAW_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          TAG=$(echo "$RAW_TAG" | xargs)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Extract metadata from tag
        id: meta
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          VERSION="${TAG#image-resize/v}"

          if [[ "$VERSION" =~ -dry-run\.[0-9]+$ ]]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" =~ -([a-z]+)\.[0-9]+$ ]]; then
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::image-resize release -- tag=$TAG version=$VERSION"

  # ──────────────────────────────────────────────────────────────
  # GitHub Release
  # ──────────────────────────────────────────────────────────────

  create-release:
    name: Create GitHub Release
    needs: [setup]
    if: needs.setup.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          name: image-resize ${{ needs.setup.outputs.version }}
          draft: false
          prerelease: ${{ needs.setup.outputs.is_prerelease == 'true' }}
          generate_release_notes: true

  # ──────────────────────────────────────────────────────────────
  # Binary Build
  # ──────────────────────────────────────────────────────────────

  binary-build:
    name: Binary Release
    needs: [setup, create-release]
    if: ${{ !failure() && !cancelled() }}
    uses: ./.github/workflows/_rust-binary.yml
    with:
      bin_name: image-resize
      manifest_path: image-resize/Cargo.toml
      tag_name: ${{ needs.setup.outputs.tag }}
      is_prerelease: ${{ needs.setup.outputs.is_prerelease == 'true' }}
      skip_create_release: true
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
    secrets: inherit
