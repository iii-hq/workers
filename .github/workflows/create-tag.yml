name: Create Tag

on:
  workflow_dispatch:
    inputs:
      worker:
        description: 'Worker module to release'
        required: true
        type: choice
        options:
          - a2a
          - a2a-client
          - agent
          - coding
          - conductor
          - eval
          - experiment
          - guardrails
          - iii-lsp
          - iii-lsp-vscode
          - image-resize
          - introspect
          - llm-router
          - mcp
          - mcp-client
          - proof
          - shell
          - todo-worker
          - todo-worker-python
      bump:
        description: 'Version bump'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      tag:
        description: 'Registry tag (passed to POST /publish; not part of git tag name)'
        required: true
        type: choice
        options:
          - latest
          - next
        default: latest

permissions:
  contents: write

concurrency:
  group: create-tag
  cancel-in-progress: false

jobs:
  create-tag:
    name: Bump version & create tag
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.III_CI_APP_ID }}
          private-key: ${{ secrets.III_CI_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.generate_token.outputs.token }}

      - name: Pre-flight checks
        env:
          WORKER: ${{ inputs.worker }}
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [[ "$BRANCH" != "main" ]]; then
            echo "::error::Must be on main branch (currently on $BRANCH)"
            exit 1
          fi
          if [[ ! -d "$WORKER" ]]; then
            echo "::error::Worker directory does not exist: $WORKER"
            exit 1
          fi

      - name: Discover manifest type
        id: meta
        env:
          WORKER: ${{ inputs.worker }}
        run: |
          # iii-lsp-vscode does not have iii.worker.yaml (special VS Code extension flow)
          if [[ "$WORKER" == "iii-lsp-vscode" ]]; then
            echo "manifest=package.json" >> "$GITHUB_OUTPUT"
            echo "manifest_type=node" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ ! -f "$WORKER/iii.worker.yaml" ]]; then
            echo "::error::$WORKER/iii.worker.yaml is missing"
            exit 1
          fi
          MANIFEST=$(grep '^manifest:' "$WORKER/iii.worker.yaml" | head -n1 | awk '{print $2}')
          if [[ -z "$MANIFEST" ]]; then
            echo "::error::$WORKER/iii.worker.yaml has no 'manifest' key"
            exit 1
          fi
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
          case "$MANIFEST" in
            Cargo.toml) echo "manifest_type=cargo" >> "$GITHUB_OUTPUT" ;;
            package.json) echo "manifest_type=node" >> "$GITHUB_OUTPUT" ;;
            pyproject.toml) echo "manifest_type=python" >> "$GITHUB_OUTPUT" ;;
            *) echo "::error::Unsupported manifest: $MANIFEST"; exit 1 ;;
          esac

      - name: Calculate next version
        id: versions
        env:
          WORKER: ${{ inputs.worker }}
          BUMP: ${{ inputs.bump }}
          MANIFEST_TYPE: ${{ steps.meta.outputs.manifest_type }}
          MANIFEST: ${{ steps.meta.outputs.manifest }}
        run: |
          read_version() {
            case "$MANIFEST_TYPE" in
              cargo)
                grep '^version = ' "$1" | head -n1 | cut -d'"' -f2
                ;;
              node)
                jq -r '.version' "$1"
                ;;
              python)
                # PEP 621 [project] version = "..."
                python3 -c "
          import re, sys
          text = open(sys.argv[1]).read()
          in_proj = False
          for line in text.splitlines():
              s = line.strip()
              if s.startswith('['):
                  in_proj = (s == '[project]')
                  continue
              if in_proj:
                  m = re.match(r'version\s*=\s*\"([^\"]+)\"', s)
                  if m:
                      print(m.group(1))
                      sys.exit(0)
          " "$1"
                ;;
            esac
          }

          bump_version() {
            local current="$1"
            local base="${current%%-*}"
            IFS='.' read -r major minor patch <<< "$base"
            case "$BUMP" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
            esac
            echo "${major}.${minor}.${patch}"
          }

          current=$(read_version "$WORKER/$MANIFEST")
          if [[ -z "$current" ]]; then
            echo "::error::Could not read version from $WORKER/$MANIFEST"
            exit 1
          fi
          new_ver=$(bump_version "$current")
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "version=$new_ver" >> "$GITHUB_OUTPUT"
          echo "tag=${WORKER}/v${new_ver}" >> "$GITHUB_OUTPUT"
          echo "::notice::${WORKER}: ${current} -> ${new_ver}"

      - name: Update manifest
        env:
          WORKER: ${{ inputs.worker }}
          MANIFEST_TYPE: ${{ steps.meta.outputs.manifest_type }}
          MANIFEST: ${{ steps.meta.outputs.manifest }}
          NEW_VERSION: ${{ steps.versions.outputs.version }}
        run: |
          path="$WORKER/$MANIFEST"
          case "$MANIFEST_TYPE" in
            cargo)
              sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"${NEW_VERSION}\"/}" "$path"
              ;;
            node)
              jq --arg v "$NEW_VERSION" '.version = $v' "$path" > "${path}.tmp"
              mv "${path}.tmp" "$path"
              ;;
            python)
              python3 - <<PY
          import re, pathlib
          p = pathlib.Path("$path")
          text = p.read_text()
          out, in_proj, replaced = [], False, False
          for line in text.splitlines():
              s = line.strip()
              if s.startswith("["):
                  in_proj = (s == "[project]")
              if in_proj and not replaced and re.match(r'version\s*=\s*"[^"]+"', s):
                  line = re.sub(r'version\s*=\s*"[^"]+"', 'version = "${NEW_VERSION}"', line)
                  replaced = True
              out.append(line)
          if not replaced:
              raise SystemExit("could not find version in [project]")
          p.write_text("\n".join(out) + ("\n" if text.endswith("\n") else ""))
          PY
              ;;
          esac
          echo "Updated $path to ${NEW_VERSION}"

      - name: Validate manifest update
        env:
          WORKER: ${{ inputs.worker }}
          MANIFEST_TYPE: ${{ steps.meta.outputs.manifest_type }}
          MANIFEST: ${{ steps.meta.outputs.manifest }}
          NEW_VERSION: ${{ steps.versions.outputs.version }}
        run: |
          case "$MANIFEST_TYPE" in
            cargo)   actual=$(grep '^version = ' "$WORKER/$MANIFEST" | head -n1 | cut -d'"' -f2) ;;
            node)    actual=$(jq -r '.version' "$WORKER/$MANIFEST") ;;
            python)  actual=$(python3 -c "import re,sys; t=open(sys.argv[1]).read(); proj=False
          for ln in t.splitlines():
              s=ln.strip()
              if s.startswith('['): proj=(s=='[project]'); continue
              if proj:
                  m=re.match(r'version\s*=\s*\"([^\"]+)\"', s)
                  if m: print(m.group(1)); sys.exit(0)" "$WORKER/$MANIFEST") ;;
          esac
          if [[ "$actual" != "$NEW_VERSION" ]]; then
            echo "::error::Manifest mismatch: expected $NEW_VERSION, got $actual"
            exit 1
          fi
          echo "Validated $WORKER/$MANIFEST = $actual"

      - name: Check tag does not exist
        env:
          TAG: ${{ steps.versions.outputs.tag }}
        run: |
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "workers-ci[bot]"
          git config user.email "workers-ci[bot]@users.noreply.github.com"

      - name: Commit and push
        env:
          WORKER: ${{ inputs.worker }}
          NEW_VERSION: ${{ steps.versions.outputs.version }}
        run: |
          git add -A
          git commit -m "chore(${WORKER}): bump to v${NEW_VERSION}"
          git push origin main

      - name: Create and push annotated tag
        env:
          TAG: ${{ steps.versions.outputs.tag }}
          REGISTRY_TAG: ${{ inputs.tag }}
          WORKER: ${{ inputs.worker }}
          NEW_VERSION: ${{ steps.versions.outputs.version }}
        run: |
          git tag -a "$TAG" -m "Release $TAG

          worker: $WORKER
          version: $NEW_VERSION
          registry-tag: $REGISTRY_TAG
          "
          git push origin "$TAG"
          echo "::notice::Created tag: $TAG (registry-tag=$REGISTRY_TAG)"
